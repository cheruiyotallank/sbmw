<!-- Tools & Apps Row -->
<section id="tools-and-apps" class="section-block alt-block">
  <div class="container-fluid px-4 px-xl-5">
    
    <!-- Tools Row -->
    <div class="tools-section mb-5 pb-3">
      <h2 class="section-header-navy mb-4 fx-reveal-item" appScrollReveal>Tools to bank with ease</h2>
      <div class="row g-4">
        <div class="col-lg-3 col-md-6 fx-reveal-item fx-delay-1" appScrollReveal>
          <div role="button" tabindex="0" class="navy-tool-btn">
            <div class="tool-icon-circle"><i class="fa fa-map-marker"></i></div>
            <span class="tool-text">SBM Branch, ATM or Agent near me</span>
          </div>
        </div>
        <div class="col-lg-3 col-md-6 fx-reveal-item fx-delay-2" appScrollReveal>
          <div role="button" tabindex="0" class="navy-tool-btn">
            <div class="tool-icon-circle"><i class="fa fa-file-pdf-o"></i></div>
            <span class="tool-text">Resources</span>
          </div>
        </div>
        <div class="col-lg-3 col-md-6 fx-reveal-item fx-delay-3" appScrollReveal>
          <div role="button" tabindex="0" class="navy-tool-btn">
            <div class="tool-icon-circle"><i class="fa fa-phone"></i></div>
            <span class="tool-text">Contact Us</span>
          </div>
        </div>
        <div class="col-lg-3 col-md-6 fx-reveal-item fx-delay-4" appScrollReveal>
          <div role="button" tabindex="0" class="navy-tool-btn">
            <div class="tool-icon-circle"><i class="fa fa-question-circle"></i></div>
            <span class="tool-text">Frequently Asked Questions</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Apps Row -->
    <div class="apps-download-section pt-4">
      <div class="row g-4 align-items-stretch">
        
        <!-- Mobile App Card -->
        <div class="col-lg-6 fx-reveal-item fx-delay-1" appScrollReveal>
          <div class="banking-tool-card">
            <div class="card-content d-flex align-items-center gap-4 flex-wrap flex-sm-nowrap">
              <img src="assets/images/sbm-app-logo.png" alt="SBM Mobile App Logo" class="tool-logo-img">
              <div class="app-info-visual">
                <h3>SBM Mfukoni Mobile App</h3>
                <p>Stay connected, enjoy convenience and peace of mind</p>
                <div class="app-badges-row">
                  <a href="#" class="store-badge-link">
                    <img src="assets/images/google-play-badge.png" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg'" alt="Get it on Google Play" class="store-badge-img">
                  </a>
                  <a href="#" class="store-badge-link">
                    <img src="assets/images/app-store-badge.png" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg'" alt="Download on the App Store" class="store-badge-img apple-badge">
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Internet Banking Card -->
        <div class="col-lg-6 fx-reveal-item fx-delay-2" appScrollReveal>
          <div class="banking-tool-card">
            <div class="card-content d-flex align-items-center gap-4 flex-wrap flex-sm-nowrap">
              <img src="assets/images/sbm-laptop-login.png" alt="SBM Internet Banking Login" class="tool-laptop-img">
              <div class="app-info-visual">
                <h3>SBM Internet Banking</h3>
                <p>Stay connected, enjoy convenience and peace of mind</p>
                <a routerLink="/internet-banking" class="btn btn-sbm-login mt-2">LOG IN <i class="fa fa-arrow-right ms-2"></i></a>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</section>
