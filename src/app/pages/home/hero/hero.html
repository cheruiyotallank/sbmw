<!-- Modern Split Hero Component -->
<section class="split-hero-section position-relative overflow-hidden">
  
  <!-- Subtle Abstract Background (Instead of full-width image) -->
  <div class="hero-gradient-bg"></div>

  <div class="container-fluid px-4 px-xl-5">
    <div class="row align-items-center min-vh-75 py-5">
      
      <!-- ========================================== -->
      <!-- LEFT SIDE (50%): Value Proposition & CTAs  -->
      <!-- ========================================== -->
      <div class="col-lg-6 hero-content-left position-relative z-3 pe-lg-5 mb-5 mb-lg-0">
        
        <!-- Small Pill Badge -->
        <div class="hero-pill-badge mb-4">
          <span class="dot pulse-animation"></span> Next-Gen Banking
        </div>
        
        <!-- Animated Slide Text Content -->
        <div class="slide-text-wrapper position-relative" style="min-height: 220px;">
          <ng-container *ngFor="let slide of slides; let i = index">
            <div class="slide-text-content w-100" [class.active-text]="i === activeSlide">
              <h1 class="hero-title-massive mb-4" *ngIf="slide.title">
                {{ slide.title }}
              </h1>
              <p class="hero-subtitle lead mb-5">
                Experience seamless digital banking designed to empower your personal and business growth in Kenya and beyond.
              </p>
              <!-- Call to Action -->
              <div class="hero-actions d-flex flex-wrap gap-3">
                <a [routerLink]="slide.ctaLink" class="btn-action-primary">
                  {{ slide.ctaLabel }} <i class="fa fa-arrow-right ms-2"></i>
                </a>
              </div>
            </div>
          </ng-container>
        </div>



      </div>

      <!-- ========================================== -->
      <!-- RIGHT SIDE (50%): Floating Image Showcase  -->
      <!-- ========================================== -->
      <div class="col-lg-6 hero-visual-right position-relative mt-4 mt-lg-0 d-flex justify-content-center align-items-center z-3">
        
        <!-- Main Floating Image Container (Now freely floating and highly visible) -->
        <div class="hero-floating-image-container position-relative z-3">
           <ng-container *ngFor="let slide of slides; let i = index">
             <img 
                [src]="slide.image" 
                class="img-fluid hero-floating-img" 
                [class.active-image]="i === activeSlide"
                alt="Hero Visual">
           </ng-container>
        </div>

        <div class="decorative-glow glow-1 position-absolute"></div>

      </div>

    </div>
  </div>
</section>
