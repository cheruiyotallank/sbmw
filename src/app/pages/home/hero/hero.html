<!-- Full-Screen Immersive Hero Component -->
<section class="immersive-hero-section position-relative overflow-hidden">
  
  <!-- Looping Background Images -->
  <div class="hero-bg-container position-absolute top-0 start-0 w-100 h-100 z-0">
    <ng-container *ngFor="let slide of slides; let i = index">
      <div class="hero-bg-slide w-100 h-100 position-absolute top-0 start-0" [class.active-bg]="i === activeSlide">
        <img [src]="slide.image" class="w-100 h-100 object-fit-cover" alt="Background Visual">
      </div>
    </ng-container>
    <!-- Dark Gradient Overlay for Text Readability -->
    <div class="hero-bg-overlay position-absolute top-0 start-0 w-100 h-100"></div>
  </div>

  <!-- Centered Content -->
  <div class="container-fluid px-4 px-xl-5 position-relative z-3 h-100 d-flex flex-column align-items-center justify-content-center">
    <div class="hero-content-centered w-100 text-center d-flex flex-column align-items-center justify-content-center position-relative">
      
      <!-- Small Pill Badge -->
      <div class="hero-pill-badge mx-auto mb-4 bg-white text-navy shadow-sm">
        <span class="dot pulse-animation"></span> Next-Gen Banking
      </div>
      
      <!-- Animated Slide Text Content -->
      <div class="slide-text-wrapper position-relative mx-auto w-100">
        <ng-container *ngFor="let slide of slides; let i = index">
          <div class="slide-text-content w-100" [class.active-text]="i === activeSlide">
            <div class="hero-glass-panel mx-auto text-center w-100 d-flex flex-column align-items-center justify-content-center">
              <h1 class="hero-title-massive mb-3 mx-auto text-center d-block" *ngIf="slide.title">
                {{ slide.title }}
              </h1>
              <p class="hero-subtitle lead mb-4 mx-auto text-center d-block">
                Experience seamless digital banking designed to empower your personal and business growth in Kenya and beyond.
              </p>
              <!-- Call to Action -->
              <div class="hero-actions d-flex justify-content-center align-items-center flex-wrap gap-3 mx-auto w-100">
                <a [routerLink]="slide.ctaLink" class="btn-action-primary px-4 py-2 fs-6 shadow-lg text-center">
                  {{ slide.ctaLabel }} <i class="fa fa-arrow-right ms-2"></i>
                </a>
              </div>
            </div>
          </div>
        </ng-container>
      </div>

    </div>
  </div>

  <!-- Carousel Controls (Centered Bottom) -->
  <div class="hero-carousel-controls position-absolute bottom-0 start-50 translate-middle-x pb-4 z-3 w-100">
    <div class="container-fluid px-4 px-xl-5">
      <div class="d-flex align-items-center justify-content-center gap-3">
        <button class="btn btn-icon-round" (click)="previousSlide()" aria-label="Previous">
          <i class="fa fa-chevron-left"></i>
        </button>
        
        <div class="carousel-indicators-modern d-flex gap-2">
          <button *ngFor="let slide of slides; let i = index"
                  class="carousel-dot-modern"
                  [class.active]="i === activeSlide"
                  (click)="selectSlide(i)"
                  [attr.aria-label]="'Slide ' + (i + 1)">
          </button>
        </div>

        <button class="btn btn-icon-round" (click)="nextSlide()" aria-label="Next">
          <i class="fa fa-chevron-right"></i>
        </button>
      </div>
    </div>
  </div>

</section>
