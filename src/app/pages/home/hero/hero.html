<section class="hero-section full-width-hero">
  <!-- Dynamic Full Width Background Images -->
  <ng-container *ngFor="let slide of slides; let i = index">
    <div 
      class="hero-full-bg" 
      [class.slide-active]="i === activeSlide"
      [class.slide-previous]="i === previousSlideIndex"
      [style.background-image]="'url(' + slide.image + ')'">
    </div>
  </ng-container>

  <!-- Content Container -->
  <div class="container-fluid px-4 px-xl-5 h-100 position-relative z-index-2">
    <!-- Foolproof Vertical Centering Wrapper -->
    <div class="d-flex align-items-center h-100 w-100">
      <div class="row w-100 hero-content-row m-0">
        <div class="col-lg-7 col-xl-6 hero-text-content text-start ps-lg-5">
          <!-- Animated Slide Content -->
          <div class="slide-content-wrapper position-relative">
            <ng-container *ngFor="let slide of slides; let i = index">
              <div class="slide-content w-100" [class.active-content]="i === activeSlide">
                <h1 class="hero-main-title mb-3" *ngIf="slide.title" style="font-size: clamp(1.8rem, 3vw, 2.8rem); font-weight: 900; letter-spacing: -0.02em; color: var(--sbm-navy);">{{ slide.title }}</h1>
                <div class="d-flex justify-content-start">
                  <a [routerLink]="slide.ctaLink" class="btn-learn-more shadow-lg">
                    {{ slide.ctaLabel }} <i class="fa fa-arrow-right ms-2" style="font-size: 0.9em;"></i>
                  </a>
                </div>
              </div>
            </ng-container>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Dots Indicator at bottom left -->
  <div class="position-absolute z-index-2" style="bottom: 30px; left: 40px;">
    <div class="carousel-indicators-angled mb-0">
      <button
        type="button"
        *ngFor="let slide of slides; index as index"
        class="carousel-dot-angled dark-dot"
        [class.active]="index === activeSlide"
        (click)="selectSlide(index)"
        [attr.aria-label]="'Go to slide ' + (index + 1)">
      </button>
    </div>
  </div>
</section>
