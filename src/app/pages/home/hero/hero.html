<section class="hero-section full-width-hero">
  <!-- Dynamic Full Width Background Images -->
  <ng-container *ngFor="let slide of slides; let i = index">
    <div 
      class="hero-full-bg" 
      [class.slide-active]="i === activeSlide"
      [class.slide-previous]="i === previousSlideIndex"
      [style.background-image]="'url(' + slide.image + ')'">
    </div>
  </ng-container>

  <!-- Content Container -->
  <div class="container-fluid px-4 px-xl-5 h-100 position-relative z-index-2 d-flex flex-column pb-5 pt-4">
  
    <!-- Text (Left Middle) -->
    <div class="row flex-grow-1 align-items-center hero-content-row">
      <div class="col-lg-7 col-xl-5 hero-text-content text-start ps-4 ps-md-5">
        <div class="slide-content-wrapper position-relative" style="min-height: 100px;">
          <ng-container *ngFor="let slide of slides; let i = index">
            <div class="slide-content w-100" [class.active-content]="i === activeSlide">
              <h1 class="hero-main-title mb-0" *ngIf="slide.title" style="font-size: clamp(2rem, 4vw, 3rem); font-weight: 900; line-height: 1.1;">{{ slide.title }}</h1>
            </div>
          </ng-container>
        </div>
      </div>
    </div>
    
    <!-- Button (Left Bottom) -->
    <div class="row align-items-end pb-3">
      <div class="col-lg-7 col-xl-5 text-start ps-4 ps-md-5">
        <div class="slide-content-wrapper position-relative" style="min-height: 50px;">
          <ng-container *ngFor="let slide of slides; let i = index">
            <div class="slide-content w-100" [class.active-content]="i === activeSlide">
              <div class="d-flex justify-content-start">
                <a [routerLink]="slide.ctaLink" class="btn-hero-primary shadow-sm" style="padding: 1rem 2.5rem; font-size: 1rem;">
                  {{ slide.ctaLabel }} <i class="fa fa-chevron-right ms-2" style="font-size: 0.85em;"></i>
                </a>
              </div>
            </div>
          </ng-container>
        </div>
      </div>
    </div>

  </div>

  <!-- Dots Indicator at bottom left -->
  <div class="position-absolute z-index-2" style="bottom: 30px; left: 40px;">
    <div class="carousel-indicators-angled mb-0">
      <button
        type="button"
        *ngFor="let slide of slides; index as index"
        class="carousel-dot-angled dark-dot"
        [class.active]="index === activeSlide"
        (click)="selectSlide(index)"
        [attr.aria-label]="'Go to slide ' + (index + 1)">
      </button>
    </div>
  </div>
</section>
