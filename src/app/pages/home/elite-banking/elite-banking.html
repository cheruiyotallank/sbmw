<section id="elite-banking" class="section-block elite-premium-section position-relative overflow-hidden">
  
  <div class="container-fluid px-4 px-xl-5 position-relative z-3">
    
    <!-- Centered Header -->
    <div class="row mb-4 text-center justify-content-center pt-2">
      <div class="col-lg-8">
        <div class="pill-badge-gold mx-auto mb-3 fx-reveal-item" appScrollReveal>
          <span class="dot-gold"></span> Premium Experience
        </div>
        <h2 class="massive-title fx-reveal-item fx-delay-1" appScrollReveal style="font-size: clamp(2rem, 4vw, 3rem);">
          <span class="elite-gold-text">Elite Banking</span> <br>
          For a Smarter Tomorrow
        </h2>
        <p class="lead-text mt-4 mx-auto fx-reveal-item fx-delay-2" appScrollReveal style="max-width: 600px;">
          You deserve banking that understands your needs and structures solutions that perfectly fit into your lifestyle.
        </p>
      </div>
    </div>

    <!-- Compact Grid of Glassmorphism Cards -->
    <div class="row g-3 justify-content-center pb-4 fx-reveal-item fx-delay-3" appScrollReveal>
      <div *ngFor="let card of eliteCards" class="col-6 col-md-4 col-xl-2">
        <div class="elite-glass-card h-100 text-center">
          <div class="icon-wrapper mx-auto"><i [class]="card.icon"></i></div>
          <h4>{{ card.title }}</h4>
          <p>{{ card.desc }}</p>
        </div>
      </div>
    </div>

    <!-- CTA Button -->
    <div class="row mt-4 pb-5">
      <div class="col-12 text-center fx-reveal-item fx-delay-7" appScrollReveal>
        <a routerLink="/for-you" class="btn btn-elite-gold-solid px-5 py-3 shadow-lg">EXPLORE ELITE BANKING <i class="fa fa-arrow-right ms-2"></i></a>
      </div>
    </div>

  </div>
</section>
