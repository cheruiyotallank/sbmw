<section class="banking-categories-section py-5">
  <div class="container-fluid px-4 px-xl-5">
    
    <div class="section-header mb-4 d-flex justify-content-between align-items-end">
      <div>
        <h2 class="section-title">Explore Our <span>Solutions</span></h2>
        <p class="section-subtitle mb-0">Financial tools designed for every stage of your journey.</p>
      </div>
      
      <!-- Custom Scroll Navigation Arrows (Optional visual cue) -->
      <div class="scroll-arrows d-none d-md-flex gap-2">
        <button class="btn-scroll rounded-circle" aria-label="Scroll left"><i class="fa fa-arrow-left"></i></button>
        <button class="btn-scroll rounded-circle" aria-label="Scroll right"><i class="fa fa-arrow-right"></i></button>
      </div>
    </div>

    <!-- Horizontal Scrollable Container -->
    <div class="categories-scroll-container pb-3">
      <div class="d-flex gap-4 categories-wrapper">
        
        <!-- Category Card -->
        <a [routerLink]="category.link" 
           class="category-card text-decoration-none flex-shrink-0" 
           *ngFor="let category of categories">
           
          <div class="card-glass-panel">
            <div class="icon-wrapper mb-4">
              <i class="fa" [ngClass]="category.icon"></i>
            </div>
            <h3 class="category-title mb-2">{{ category.title }}</h3>
            <p class="category-desc text-muted mb-4">{{ category.description }}</p>
            
            <div class="explore-link d-flex align-items-center gap-2 mt-auto">
              <span>Explore</span> <i class="fa fa-arrow-right"></i>
            </div>
          </div>
          
          <!-- Gradient Border Glow -->
          <div class="card-glow"></div>
        </a>

      </div>
    </div>

  </div>
</section>
